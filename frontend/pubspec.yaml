name: hamro_sewa_frontend
description: A service booking application for Nepal

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  intl: ^0.20.2
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  url_launcher: ^6.2.4
  uuid: ^4.3.3
  webview_flutter: ^4.4.2
  webview_flutter_android: ^4.10.13
  esewa_flutter_sdk: ^2.0.1
  device_info_plus: ^10.1.0
  share_plus: ^7.2.1
  pdf: ^3.11.1
  printing: ^5.13.4
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.2
  app_links: ^6.4.0
  android_intent_plus: ^6.0.0
  image: ^4.8.0
  http_parser: ^4.1.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/.env
